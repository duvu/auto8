services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: auto8
      POSTGRES_PASSWORD: auto8
      POSTGRES_DB: auto8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto8"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://auto8:auto8@postgres:5432/auto8
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: https://auto8.x51.vn
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
